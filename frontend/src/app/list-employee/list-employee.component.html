<div class="min-h-screen bg-[#f5f5f7] px-6 py-10">

  <div class="max-w-6xl mx-auto">

    <div class="mb-10 text-center">

      <h1 class="text-5xl font-semibold tracking-tight text-gray-900">
        Employee Dashboard
      </h1>
    </div>

    <div
      class="overflow-hidden rounded-3xl border border-gray-200 bg-white/80 shadow-2xl backdrop-blur-xl">
      <div class="border-b border-gray-200 px-8 py-5 flex flex-col md:flex-row md:items-center md:justify-between gap-4 bg-white">

        <div>
          <h2 class="text-3xl font-semibold text-gray-900 tracking-tight">
            Employee List
          </h2>

          <p class="text-sm text-gray-500 mt-1">
            Manage and search employee records
          </p>
        </div>

        <div>
          <input
            type="text"
            placeholder="🔍 Search employee..."
            [(ngModel)]="searchText"
            (input)="searchEmployee()"
            class="w-full md:w-80 px-5 py-3 rounded-2xl bg-gray-50 border border-gray-200 shadow-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-black focus:border-black transition"
          />
        </div>

      </div>

      <div class="overflow-x-auto">

        <table class="w-full">

          <thead class="bg-[#fafafa] border-b border-gray-200">

          <tr class="text-sm uppercase tracking-wider text-gray-500">

            <th class="px-8 py-5 text-left font-medium">
              ID
            </th>

            <th class="px-8 py-5 text-left font-medium">
              First Name
            </th>

            <th class="px-8 py-5 text-left font-medium">
              Last Name
            </th>

            <th class="px-8 py-5 text-left font-medium">
              Salary
            </th>

            <th class="px-8 py-5 text-center font-medium">
              Actions
            </th>

          </tr>

          </thead>

          <tbody>

          <tr
            *ngFor="let employee of filteredEmployees"
            class="border-t border-gray-100 transition-all duration-200 hover:bg-gray-50"
          >

            <td class="px-8 py-6 font-medium text-gray-800">
              {{ employee.id }}
            </td>

            <td class="px-8 py-6 text-gray-700">
              {{ employee.firstName }}
            </td>

            <td class="px-8 py-6 text-gray-700">
              {{ employee.lastName }}
            </td>

            <td class="px-8 py-6">
        <span
          class="inline-flex items-center px-3 py-1 rounded-full bg-green-50 text-green-600 font-semibold"
        >
          ₹{{ employee.salary | number }}
        </span>
            </td>

            <td class="px-8 py-6">
              <div class="flex justify-center items-center gap-3">

                <button
                  [routerLink]="['/update-employee', employee.id]"
                  class="px-4 py-2 rounded-xl bg-black text-white hover:bg-gray-800 transition text-sm font-medium cursor-pointer"
                >
                  Update
                </button>

                <button
                  (click)="deleteEmployee(employee.id!)"
                  class="px-4 py-2 rounded-xl bg-red-500 text-white hover:bg-red-600 transition text-sm font-medium cursor-pointer"
                >
                  Delete
                </button>

              </div>
            </td>

          </tr>

          <tr *ngIf="filteredEmployees.length === 0">

            <td colspan="5" class="py-12 text-center">

              <div class="flex flex-col items-center gap-2">

                <div class="text-5xl">
                  📂
                </div>

                <p class="text-lg font-medium text-gray-700">
                  No Employees Found
                </p>

                <p class="text-sm text-gray-500">
                  Try changing your search keyword
                </p>

              </div>

            </td>

          </tr>

          </tbody>

        </table>
      </div>

    </div>

  </div>

</div>
