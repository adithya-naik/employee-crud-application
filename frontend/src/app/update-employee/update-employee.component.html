<div class=" bg-[#f5f5f7] px-6 py-8">

  <div class="max-w-6xl mx-auto">

    <div class="mb-6">
      <h1 class="text-3xl font-semibold text-gray-900 tracking-tight">
        Update Employee
      </h1>

      <p class="text-gray-500 text-sm mt-1">
        Manage employee information
      </p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

      <div
        class="bg-white rounded-3xl border border-gray-200 shadow-lg overflow-hidden h-fit">

        <div class="bg-black px-6 py-5">

          <p class="text-gray-400 text-xs uppercase tracking-widest">
            Current Details
          </p>

          <h2 class="text-white text-2xl font-semibold mt-1">
            Employee #101
          </h2>

        </div>

        <div class="p-6 space-y-4">

          <div class="rounded-2xl px-5 py-2">
            <p class="text-xs text-gray-500 mb-1">
              First Name
            </p>

            <h3 class="text-lg font-semibold text-gray-900">
              Adithya
            </h3>
          </div>

          <div class="rounded-2xl px-5 py-2">
            <p class="text-xs text-gray-500 mb-1">
              Last Name
            </p>

            <h3 class="text-lg font-semibold text-gray-900">
              Naik
            </h3>
          </div>

          <div class="rounded-2xl px-5 py-2">
            <p class="text-xs text-gray-500 mb-1">
              Salary
            </p>

            <h3 class="text-lg font-bold text-green-600">
              ₹75,000
            </h3>
          </div>

        </div>

      </div>

      <div
        class="bg-white rounded-3xl border border-gray-200 shadow-lg overflow-hidden">

        <div class="px-6 py-5 border-b border-gray-100">

          <h2 class="text-2xl font-semibold text-gray-900">
            Edit Details
          </h2>

          <p class="text-gray-500 text-sm mt-1">
            Update employee information
          </p>

        </div>

        <form class="p-6 space-y-5">

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              First Name
            </label>

            <input
              type="text"
              placeholder="Enter first name"
              class="w-full px-4 py-3 rounded-2xl bg-[#fafafa] border border-gray-200 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-black transition"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Last Name
            </label>

            <input
              type="text"
              placeholder="Enter last name"
              class="w-full px-4 py-3 rounded-2xl bg-[#fafafa] border border-gray-200 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-black transition"
            />
          </div>


          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Salary
            </label>

            <input
              type="number"
              placeholder="Enter salary"
              class="w-full px-4 py-3 rounded-2xl bg-[#fafafa] border border-gray-200 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-black transition"
            />
          </div>


          <div class="flex gap-3 pt-2">

            <button
              type="submit"
              class="flex-1 bg-black text-white py-3 rounded-2xl text-sm font-medium hover:opacity-90 transition">

              Update

            </button>

            <button
              type="button"
              class="flex-1 bg-gray-100 text-gray-800 py-3 rounded-2xl text-sm font-medium hover:bg-gray-200 transition">

              Cancel

            </button>

          </div>

        </form>

      </div>

    </div>

  </div>

</div>
