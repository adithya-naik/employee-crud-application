<div class="bg-[#f5f5f7] px-6 py-10">

  <div class="max-w-3xl mx-auto">

    <!-- Header -->
    <div class="flex items-center justify-between mb-8">

      <div>
        <h1 class="text-4xl font-semibold tracking-tight text-gray-900">
          Add Employee
        </h1>

        <p class="text-gray-500 mt-2">
          Create a new employee record
        </p>
      </div>

      <button
        routerLink="/employees"
        type="button"
        class="px-5 py-3 rounded-2xl bg-white border border-gray-200 text-gray-700 hover:bg-gray-50 shadow-sm transition cursor-pointer"
      >
        ← Back
      </button>

    </div>

    <!-- Form Card -->
    <div class="bg-white rounded-3xl border border-gray-200 shadow-lg overflow-hidden">

      <!-- Card Header -->
      <div class="px-8 py-6 border-b border-gray-100">

        <h2 class="text-2xl font-semibold text-gray-900">
          Employee Information
        </h2>

        <p class="text-sm text-gray-500 mt-1">
          Fill in the details below
        </p>

      </div>

      <!-- Form -->
      <form
        class="p-8 space-y-6"
        (ngSubmit)="saveEmployee()">

        <div>

          <label class="block text-sm font-medium text-gray-700 mb-2">
            First Name
          </label>

          <input
            type="text"
            name="firstName"
            required
            [(ngModel)]="employee.firstName"
            placeholder="John"
            class="w-full px-5 py-3 rounded-2xl bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-black transition"
          />

        </div>

        <div>

          <label class="block text-sm font-medium text-gray-700 mb-2">
            Last Name
          </label>

          <input
            type="text"
            name="lastName"
            required
            [(ngModel)]="employee.lastName"
            placeholder="Doe"
            class="w-full px-5 py-3 rounded-2xl bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-black transition"
          />

        </div>

        <div>

          <label class="block text-sm font-medium text-gray-700 mb-2">
            Salary
          </label>

          <input
            type="number"
            name="salary"
            required
            [(ngModel)]="employee.salary"
            placeholder="50000"
            class="w-full px-5 py-3 rounded-2xl bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-black transition"
          />

        </div>

        <div class="flex gap-3 pt-2">

          <button
            type="submit"
            class="flex-1 bg-black text-white py-3 rounded-2xl font-medium hover:opacity-90 transition cursor-pointer"
          >
            Save Employee
          </button>

          <button
            routerLink="/employees"
            type="button"
            class="flex-1 bg-gray-100 text-gray-800 py-3 rounded-2xl font-medium hover:bg-gray-200 transition cursor-pointer"
          >
            Cancel
          </button>

        </div>

      </form>

    </div>

  </div>

</div>
