<div class="min-h-screen bg-[#f5f5f7] flex items-center justify-center p-8">

  <div class="w-full max-w-2xl bg-white rounded-3xl shadow-xl border border-gray-200 p-10">

    <div class="mb-8">

      <h1 class="text-4xl font-semibold text-gray-900 tracking-tight">
        Add Employee
      </h1>

      <p class="text-gray-500 mt-2">
        Create a new employee record
      </p>

    </div>

    <form class="space-y-6" (ngSubmit)="saveEmployee()">

      <div>

        <label class="block text-sm font-medium text-gray-700 mb-2">
          First Name
        </label>

        <input
          type="text"
          placeholder="Enter first name"
          [(ngModel)]="employee.firstName"
          name="firstName"
          class="w-full px-5 py-3 rounded-2xl bg-[#f5f5f7] border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-300"
        />

      </div>

      <div>

        <label class="block text-sm font-medium text-gray-700 mb-2">
          Last Name
        </label>

        <input
          type="text"
          placeholder="Enter last name"
          [(ngModel)]="employee.lastName"
          name="lastName"
          class="w-full px-5 py-3 rounded-2xl bg-[#f5f5f7] border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-300"
        />

      </div>

      <div>

        <label class="block text-sm font-medium text-gray-700 mb-2">
          Salary
        </label>

        <input
          type="number"
          placeholder="Enter salary"
          [(ngModel)]="employee.salary"
          name="salary"
          class="w-full px-5 py-3 rounded-2xl bg-[#f5f5f7] border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-300"
        />

      </div>

      <button
        type="submit"
        class="w-full cursor-pointer bg-black text-white py-4 rounded-2xl font-medium hover:opacity-95 transition duration-300"
      >
        Save Employee
      </button>

    </form>

  </div>

</div>
